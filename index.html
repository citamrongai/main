<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Operations Portal</title>
    
    <!-- Design System Stylesheets -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/layout.css">
    
    <style>
        /* Embedded Frame Styling for Seamless Navigation */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-color, #ffffff);
            color: var(--text-color, #000000);
            font-family: 'Helvetica Neue', Arial, sans-serif;
        }

        .portal-navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background-color: var(--bg-color, #ffffff);
            border-bottom: 2px solid var(--border-color, #000000);
        }

        .portal-brand {
            font-size: 1.25rem;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .portal-nav-links {
            display: flex;
            gap: 10px;
        }

        .nav-btn {
            background: transparent;
            color: var(--text-color, #000000);
            border: 2px solid transparent;
            padding: 8px 16px;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s ease;
        }

        .nav-btn:hover {
            border-color: var(--border-color, #000000);
        }

        .nav-btn.active {
            background-color: var(--text-color, #000000);
            color: var(--bg-color, #ffffff);
            border-color: var(--border-color, #000000);
        }

        .content-container {
            flex: 1;
            width: 100%;
            height: calc(100vh - 70px);
            border: none;
        }

        #main-frame {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <!-- Main App Navigation Bar -->
    <header class="portal-navbar">
        <div class="portal-brand">Media Operations Portal</div>
        <nav class="portal-nav-links">
            <!-- Points to calendar.html by default -->
            <button class="nav-btn active" data-page="pages/calendar.html">Booking Calendar</button>
            <button class="nav-btn" data-page="pages/lyrics.html">Lyrics</button>
        </nav>
    </header>

    <!-- Main Content View Area -->
    <main class="content-container">
        <!-- Defaults directly to calendar.html on load -->
        <iframe id="main-frame" src="pages/calendar.html" title="Portal View"></iframe>
    </main>

    <!-- Core App Scripts -->
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>

    <script>
        // Smooth Tab Switching Script
        document.addEventListener('DOMContentLoaded', () => {
            const navButtons = document.querySelectorAll('.nav-btn');
            const mainFrame = document.getElementById('main-frame');

            navButtons.forEach(button => {
                button.addEventListener('click', () => {
                    // Update active button state
                    navButtons.forEach(btn => btn.classList.remove('active'));
                    button.classList.add('active');

                    // Load the requested sub-page into the main iframe
                    const pageUrl = button.getAttribute('data-page');
                    if (pageUrl) {
                        mainFrame.src = pageUrl;
                    }
                });
            });
        });
    </script>
</body>
</html>
