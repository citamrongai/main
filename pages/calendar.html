<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Calendar - Media Operations Portal</title>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/calendar.css">
    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function(){
            emailjs.init("YOUR_EMAILJS_PUBLIC_KEY");
        })();
    </script>
</head>
<body>
    <div id="calendar-tab" class="tab-content">
        <div class="calendar-header">
            <h2>Service Roster & Booking</h2>
            
            <div class="header-actions">
                <!-- Admin Action Controls (Visible only to Admin) -->
                <div id="admin-controls" class="hidden">
                    <button id="add-event-btn" class="btn-primary">+ Add Event</button>
                    <button id="finalize-roster-btn" class="btn-secondary">Finalize & Email</button>
                    <button id="admin-logout-btn" class="btn-secondary">Logout Admin</button>
                </div>
                <!-- Admin Login Button (Visible to Public) -->
                <button id="admin-login-btn" class="btn-secondary">Admin Login</button>
            </div>
        </div>

        <!-- Thursday Deadline Banner -->
        <div id="urgent-banner" class="banner hidden">
            <strong>URGENT:</strong> Slots are still open for this weekend's service! Please register your availability below.
        </div>

        <!-- Service Events Grid -->
        <div id="calendar-grid" class="calendar-grid"></div>

        <!-- Volunteer Registration Modal -->
        <div id="booking-modal" class="modal hidden">
            <div class="modal-content">
                <span class="close-btn" id="close-booking-modal">&times;</span>
                <h3>Register Availability</h3>
                <form id="booking-form">
                    <div class="form-group">
                        <label for="user-name">Your Full Name</label>
                        <input type="text" id="user-name" placeholder="e.g. Jane Doe" required>
                    </div>
                    <div class="form-group">
                        <label for="user-phone">Phone Number (10 Digits)</label>
                        <input type="tel" id="user-phone" placeholder="07... or 01..." required>
                        <small id="phone-error" class="error-msg hidden">Must be 10 digits starting with 07 or 01.</small>
                    </div>
                    <div class="form-group">
                        <label for="role-select">Select Role</label>
                        <select id="role-select" required>
                            <option value="">-- Select a Role --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="service-select">Select Service</label>
                        <select id="service-select" required disabled>
                            <option value="">-- Select Service --</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary">Confirm Slot</button>
                </form>
            </div>
        </div>

        <!-- Admin Login Modal -->
        <div id="admin-modal" class="modal hidden">
            <div class="modal-content">
                <span class="close-btn" id="close-admin-modal">&times;</span>
                <h3>Admin Login</h3>
                <form id="admin-login-form">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="admin-username" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="admin-password" required>
                    </div>
                    <small id="login-error" class="error-msg hidden">Invalid credentials.</small>
                    <button type="submit" class="btn-primary" style="margin-top:10px;">Login</button>
                </form>
            </div>
        </div>
    </div>

    <script src="../js/users.js"></script>
    <script src="../js/calendar.js"></script>
</body>
</html>
